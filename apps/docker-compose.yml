services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

    depends_on:
      - backend

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: url_shortener

    ports:
      - "5432:5432"